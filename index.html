<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Portaria - Vicon</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #ff0000; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; color: white; margin-bottom: 20px; margin-top: 20px; }
        .header h1 { margin: 0; font-size: 50px; font-weight: bold; letter-spacing: 3px; }
        .header p { margin: 5px 0 0; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; }
        
        .container { background-color: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 650px; margin-bottom: 20px; box-sizing: border-box; }
        h2 { margin-top: 0; color: #333; text-align: center; margin-bottom: 20px; }
        h3 { color: #555; border-bottom: 2px solid #e0e0e0; padding-bottom: 8px; margin-top: 15px; margin-bottom: 15px; }
        
        /* Menu de Abas */
        .abas-menu { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ccc; width: 100%; }
        .aba-btn { flex: 1; padding: 12px; border: none; background: #e0e0e0; cursor: pointer; font-size: 16px; font-weight: bold; color: #555; transition: 0.3s; border-radius: 8px 8px 0 0; }
        .aba-btn.ativa { background: #2c3e50; color: white; }
        .aba-conteudo { display: none; }
        .aba-conteudo.ativa { display: block; }

        label { display: block; margin-bottom: 5px; color: #666; font-weight: 500; }
        input[type="text"], select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        .busca-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .busca-container input { margin-bottom: 0; flex: 1; }
        
        .opcoes-operacao { display: flex; gap: 20px; margin-bottom: 15px; padding: 5px 0; }
        .opcoes-operacao label { display: flex; align-items: center; gap: 8px; cursor: pointer; color: #333; font-weight: bold; }
        .opcoes-operacao input[type="radio"] { transform: scale(1.2); cursor: pointer; }

        /* Múltiplas Notas Fiscais */
        .nf-wrapper { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .nf-wrapper input { margin-bottom: 0; flex: 1; }
        .btn-add-nf { background-color: #4a90e2; color: white; padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-add-nf:hover { background-color: #357abd; }
        .btn-remove-nf { background-color: #d9534f; color: white; padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-remove-nf:hover { background-color: #c9302c; }
        
        /* Estilos de Botões */
        button { padding: 12px 20px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background-color 0.3s; font-weight: bold; }
        .btn-busca { background-color: #4a90e2; color: white; }
        .btn-busca:hover { background-color: #357abd; }
        .btn-salvar { background-color: #2c3e50; color: white; width: 100%; margin-top: 10px; }
        .btn-salvar:hover { background-color: #1a252f; }
        .btn-relatorio { background-color: #27ae60; color: white; width: 100%; margin-top: 15px; margin-bottom: 5px; }
        .btn-relatorio:hover { background-color: #219653; }
        .btn-saida { background-color: #e67e22; color: white; padding: 8px 12px; font-size: 13px; border-radius: 4px; }
        .btn-saida:hover { background-color: #d35400; }
        
        /* Modal flutuante para a Saída do Caminhão */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 90%; max-width: 450px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-cancelar { background-color: #7f8c8d; color: white; flex: 1; }
        .btn-confirmar-saida { background-color: #d35400; color: white; flex: 1; }

        .resultado-busca { background-color: #f0f7ff; border: 1px solid #4a90e2; padding: 15px; border-radius: 6px; margin-bottom: 20px; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; font-size: 14px; }
        th { background-color: #f2f2f2; color: #333; }
        .status-patio { color: #27ae60; font-weight: bold; }
        .status-encerrado { color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <h1>VICON</h1>
        <p>Máquinas Agrícolas</p>
    </div>

    <div class="container">
        <h2>Controle de Portaria</h2>
        
        <div class="abas-menu">
            <button class="aba-btn ativa" id="btn-aba-portaria" onclick="mudarAba('portaria')">Portaria Geral</button>
            <button class="aba-btn" id="btn-aba-entregas" onclick="mudarAba('entregas')">Recebimento / Coleta</button>
        </div>

        <h3>Pesquisar Cadastro</h3>
        <div class="busca-container">
            <input type="text" id="campoBusca" placeholder="Digite nome, CPF, placa ou NF...">
            <button type="button" class="btn-busca" onclick="executarBusca()">Buscar</button>
        </div>
        <div id="painelResultado" style="display: none;"></div>

        <div id="aba-portaria" class="aba-conteudo ativa">
            <form id="formPortaria">
                <h3>Cadastro Geral</h3>
                <label for="tipo">Tipo de Cadastro:</label>
                <select id="tipo" name="tipo" required>
                    <option value="Visitante">Visitante</option>
                    <option value="Prestador">Prestador de Serviço</option>
                    <option value="Funcionário">Funcionário</option>
                </select>

                <label for="nome">Nome:</label>
                <input type="text" id="nome" required>

                <label for="cpf">CPF/CNPJ:</label>
                <input type="text" id="cpf" required>

                <label for="empresa">Empresa (se aplicável):</label>
                <input type="text" id="empresa">

                <label for="visitado">Quem vai visitar / Setor:</label>
                <input type="text" id="visitado" required>

                <button type="submit" class="btn-salvar">Salvar Entrada</button>
            </form>
            
            <button type="button" class="btn-relatorio" onclick="gerarExcel()">📊 Gerar Relatório Excel (Portaria)</button>
        </div>

        <div id="aba-entregas" class="aba-conteudo">
            <form id="formEntregas">
                <h3>Tipo de Operação (Entrada)</h3>
                <div class="opcoes-operacao">
                    <label>
                        <input type="radio" name="operacao" value="Recebimento" checked onclick="ajustarCamposOperacao('Recebimento')"> 
                        Recebimento (Carregado com NF)
                    </label>
                    <label>
                        <input type="radio" name="operacao" value="Coleta" onclick="ajustarCamposOperacao('Coleta')"> 
                        Coleta (Vazio / Vai Carregar)
                    </label>
                </div>

                <h3>Dados do Motorista e Veículo</h3>
                <label for="entregador">Nome do Motorista:</label>
                <input type="text" id="entregador" required>

                <label for="cpf_entregador">CPF do Motorista:</label>
                <input type="text" id="cpf_entregador" required>

                <label for="empresa_entrega">Empresa / Transportadora:</label>
                <input type="text" id="empresa_entrega">

                <label for="placa_carro">Placa do Veículo:</label>
                <input type="text" id="placa_carro" required>

                <label for="modelo_carro">Modelo do Veículo:</label>
                <input type="text" id="modelo_carro">

                <div id="secao-nf-entrada">
                    <label>Número da(s) Nota(s) Fiscal(is) de Entrada:</label>
                    <div id="lista-nfs-entrada">
                        <div class="nf-wrapper">
                            <input type="text" class="input-nf-entrada" id="primeira-nf-entrada" placeholder="Número da NF de Entrada">
                            <button type="button" class="btn-add-nf" onclick="adicionarCampoNF('lista-nfs-entrada', 'input-nf-entrada')">+</button>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-salvar">Registrar Entrada no Pátio</button>
            </form>

            <button type="button" class="btn-relatorio" onclick="gerarExcel()">📊 Gerar Relatório Excel (Pátio)</button>
        </div>
    </div>

    <div class="container" style="max-width: 850px;">
        <h3 id="tituloRelatorio">Pessoas no Interior da Empresa</h3>
        <table id="tabelaRelatorio">
            <thead id="cabecalhoTabela"></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="modalSaida" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">Registrar Saída do Veículo</h3>
            <p>O veículo está saindo com Nota Fiscal de Saída/Coleta?</p>
            
            <div id="lista-nfs-saida">
                <div class="nf-wrapper">
                    <input type="text" class="input-nf-saida" placeholder="Número da NF de Saída (Opcional)">
                    <button type="button" class="btn-add-nf" onclick="adicionarCampoNF('lista-nfs-saida', 'input-nf-saida')">+</button>
                </div>
            </div>
            
            <div class="modal-actions">
                <button type="button" class="btn-cancelar" onclick="fecharModalSaida()">Cancelar</button>
                <button type="button" class="btn-confirmar-saida" onclick="confirmarSaidaCaminhao()">Confirmar Saída</button>
            </div>
        </div>
    </div>

    <script>
        let abaAtiva = 'portaria';
        let indexCaminhaoSelecionado = null;

        // Gerenciamento de Abas
        function mudarAba(aba) {
            abaAtiva = aba;
            document.querySelectorAll('.aba-btn').forEach(btn => btn.classList.remove('ativa'));
            document.querySelectorAll('.aba-conteudo').forEach(cont => cont.classList.remove('ativa'));
            document.getElementById('painelResultado').style.display = 'none';
            document.getElementById('campoBusca').value = '';

            if(aba === 'portaria') {
                document.getElementById('btn-aba-portaria').classList.add('ativa');
                document.getElementById('aba-portaria').classList.add('ativa');
                document.getElementById('tituloRelatorio').innerText = "Pessoas no Interior da Empresa";
            } else {
                document.getElementById('btn-aba-entregas').classList.add('ativa');
                document.getElementById('aba-entregas').classList.add('ativa');
                document.getElementById('tituloRelatorio').innerText = "Fluxo de Carga e Descarga (Pátio)";
            }
            atualizarTabela();
        }

        // Ajusta campos obrigatórios de NF dependendo da operação
        function ajustarCamposOperacao(tipo) {
            const secaoNF = document.getElementById('secao-nf-entrada');
            const primeiraNF = document.getElementById('primeira-nf-entrada');
            if (tipo === 'Coleta') {
                secaoNF.style.display = 'none';
                primeiraNF.removeAttribute('required');
            } else {
                secaoNF.style.display = 'block';
                primeiraNF.setAttribute('required', 'required');
            }
        }

        // Adiciona campos de NF dinamicamente (+)
        function adicionarCampoNF(idContainer, classeInput) {
            const container = document.getElementById(idContainer);
            const novoBloco = document.createElement('div');
            novoBloco.className = 'nf-wrapper';
            novoBloco.innerHTML = `
                <input type="text" class="${classeInput}" placeholder="Digite outra NF" required>
                <button type="button" class="btn-remove-nf" onclick="this.parentElement.remove()">x</button>
            `;
            container.appendChild(novoBloco);
        }

        function resetarCamposNFEntrada() {
            document.getElementById('lista-nfs-entrada').innerHTML = `
                <div class="nf-wrapper">
                    <input type="text" class="input-nf-entrada" id="primeira-nf-entrada" placeholder="Número da NF de Entrada">
                    <button type="button" class="btn-add-nf" onclick="adicionarCampoNF('lista-nfs-entrada', 'input-nf-entrada')">+</button>
                </div>
            `;
        }

        function resetarCamposNFSaida() {
            document.getElementById('lista-nfs-saida').innerHTML = `
                <div class="nf-wrapper">
                    <input type="text" class="input-nf-saida" placeholder="Número da NF de Saída (Opcional)">
                    <button type="button" class="btn-add-nf" onclick="adicionarCampoNF('lista-nfs-saida', 'input-nf-saida')">+</button>
                </div>
            `;
        }

        function obterDataHoraAtual() {
            const agora = new Date();
            return `${agora.toLocaleDateString('pt-BR')} às ${agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
        }

        // Atualiza a tabela com base na aba ativa
        function atualizarTabela() {
            const tbody = document.getElementById('tabelaRelatorio').querySelector('tbody');
            const cabecalho = document.getElementById('cabecalhoTabela');
            tbody.innerHTML = '';

            if (abaAtiva === 'portaria') {
                cabecalho.innerHTML = `<tr><th>Tipo</th><th>Nome</th><th>CPF</th><th>Quem vai Visitar</th></tr>`;
                const registros = JSON.parse(localStorage.getItem('vicon_portaria') || '[]');
                registros.forEach(r => {
                    const linha = document.createElement('tr');
                    linha.innerHTML = `<td>${r.tipo}</td><td>${r.nome}</td><td>${r.cpf}</td><td>${r.visitado}</td>`;
                    tbody.appendChild(linha);
                });
            } else {
                cabecalho.innerHTML = `<tr><th>Operação</th><th>Motorista</th><th>Placa</th><th>Entrada</th><th>Saída</th><th>Ações</th></tr>`;
                const entregas = JSON.parse(localStorage.getItem('vicon_entregas') || '[]');
                
                entregas.forEach((e, index) => {
                    const linha = document.createElement('tr');
                    let acao = `<span class="status-encerrado">Concluído</span>`;
                    if (!e.saida) {
                        acao = `<button class="btn-saida" onclick="abrirModalSaida(${index})">Dar Saída</button>`;
                    }

                    let exibicaoNotas = '';
                    if(e.numero_nf) exibicaoNotas += `<br><small style="color:#2980b9">NF Entr: ${e.numero_nf}</small>`;
                    if(e.numero_nf_saida) exibicaoNotas += `<br><small style="color:#d35400">NF Saíd: ${e.numero_nf_saida}</small>`;

                    linha.innerHTML = `
                        <td style="font-weight:bold; color:${e.operacao === 'Recebimento' ? '#2980b9' : '#8e44ad'}">${e.operacao}</td>
                        <td>${e.entregador} ${exibicaoNotas}</td>
                        <td>${e.placa_carro}</td>
                        <td><small>${e.entrada}</small></td>
                        <td><small>${e.saida ? e.saida : '<span class="status-patio">No Pátio</span>'}</small></td>
                        <td>${acao}</td>
                    `;
                    tbody.appendChild(linha);
                });
            }
        }

        // Modais de Saída
        function abrirModalSaida(index) {
            indexCaminhaoSelecionado = index;
            resetarCamposNFSaida();
            document.getElementById('modalSaida').style.display = 'flex';
        }

        function fecharModalSaida() {
            document.getElementById('modalSaida').style.display = 'none';
            indexCaminhaoSelecionado = null;
        }

        // Registro de saída com validação de índice (Segurança)
        function confirmarSaidaCaminhao() {
            if (indexCaminhaoSelecionado === null) return;
            
            let lista = JSON.parse(localStorage.getItem('vicon_entregas') || '[]');
            
            if (!lista[indexCaminhaoSelecionado]) {
                alert("Erro ao localizar o veículo. Atualize a página e tente novamente.");
                fecharModalSaida();
                return;
            }

            const inputsNFSaida = document.querySelectorAll('.input-nf-saida');
            let nfsSaida = [];
            
            inputsNFSaida.forEach(input => {
                if(input.value.trim() !== "") nfsSaida.push(input.value.trim());
            });

            lista[indexCaminhaoSelecionado].saida = obterDataHoraAtual();
            lista[indexCaminhaoSelecionado].numero_nf_saida = nfsSaida.join(', ');

            localStorage.setItem('vicon_entregas', JSON.stringify(lista));
            fecharModalSaida();
            atualizarTabela();
        }

        // Submit: Formulário Portaria Geral
        document.getElementById('formPortaria').addEventListener('submit', function(e) {
            e.preventDefault();
            const novo = {
                tipo: document.getElementById('tipo').value,
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value.trim(),
                empresa: document.getElementById('empresa').value,
                visitado: document.getElementById('visitado').value
            };
            let lista = JSON.parse(localStorage.getItem('vicon_portaria') || '[]');
            lista.push(novo);
            localStorage.setItem('vicon_portaria', JSON.stringify(lista));
            this.reset();
            atualizarTabela();
        });

        // Submit: Formulário Recebimento / Coleta
        document.getElementById('formEntregas').addEventListener('submit', function(e) {
            e.preventDefault();
            const operacao = document.querySelector('input[name="operacao"]:checked').value;
            
            const inputsNFEntrada = document.querySelectorAll('.input-nf-entrada');
            let nfsEntrada = [];
            inputsNFEntrada.forEach(input => {
                if(input.value.trim() !== "") nfsEntrada.push(input.value.trim());
            });

            const novo = {
                operacao: operacao,
                entregador: document.getElementById('entregador').value,
                cpf_entregador: document.getElementById('cpf_entregador').value.trim(),
                empresa_entrega: document.getElementById('empresa_entrega').value,
                placa_carro: document.getElementById('placa_carro').value.toUpperCase(),
                modelo_carro: document.getElementById('modelo_carro').value,
                numero_nf: operacao === 'Recebimento' ? nfsEntrada.join(', ') : '',
                entrada: obterDataHoraAtual(),
                saida: null,
                numero_nf_saida: ''
            };

            let lista = JSON.parse(localStorage.getItem('vicon_entregas') || '[]');
            lista.push(novo);
            localStorage.setItem('vicon_entregas', JSON.stringify(lista));
            
            this.reset();
            resetarCamposNFEntrada();
            ajustarCamposOperacao('Recebimento');
            atualizarTabela();
        });

        // Motor de Busca Avançado
        function executarBusca() {
            const termo = document.getElementById('campoBusca').value.toLowerCase().trim();
            const painel = document.getElementById('painelResultado');
            
            if (!termo) {
                painel.style.display = 'none';
                return;
            }

            let resultadosHTML = '<h3 style="margin-top:0;">Resultados da Busca:</h3>';
            let encontrou = false;

            const portaria = JSON.parse(localStorage.getItem('vicon_portaria') || '[]');
            const rPortaria = portaria.filter(p => 
                p.nome.toLowerCase().includes(termo) || 
                p.cpf.includes(termo) || 
                (p.empresa && p.empresa.toLowerCase().includes(termo))
            );

            if (rPortaria.length > 0) {
                encontrou = true;
                resultadosHTML += '<h4 style="margin-bottom:5px; color:#2c3e50;">Portaria Geral</h4><ul style="margin-top:0;">';
                rPortaria.forEach(r => resultadosHTML += `<li><strong>${r.nome}</strong> (CPF: ${r.cpf}) - Empresa: ${r.empresa || 'N/A'} | Visita: ${r.visitado}</li>`);
                resultadosHTML += '</ul>';
            }

            const entregas = JSON.parse(localStorage.getItem('vicon_entregas') || '[]');
            const rEntregas = entregas.filter(e => 
                e.entregador.toLowerCase().includes(termo) || 
                e.cpf_entregador.includes(termo) || 
                e.placa_carro.toLowerCase().includes(termo) ||
                (e.numero_nf && e.numero_nf.includes(termo)) ||
                (e.numero_nf_saida && e.numero_nf_saida.includes(termo))
            );
            
            if (rEntregas.length > 0) {
                encontrou = true;
                resultadosHTML += '<h4 style="margin-bottom:5px; color:#2980b9;">Entregas e Coletas</h4><ul style="margin-top:0;">';
                rEntregas.forEach(r => {
                    let nfText = r.operacao === 'Recebimento' ? `NF Ent: ${r.numero_nf}` : `NF Saída: ${r.numero_nf_saida || 'N/A'}`;
                    resultadosHTML += `<li><strong>${r.operacao}</strong>: ${r.entregador} - Placa: ${r.placa_carro} (${nfText}) | Status: ${r.saida ? 'Concluído' : 'No Pátio'}</li>`;
                });
                resultadosHTML += '</ul>';
            }

            if (!encontrou) {
                resultadosHTML += '<p style="color:#e74c3c; font-weight:bold;">Nenhum registro encontrado para essa busca.</p>';
            }

            painel.className = 'resultado-busca';
            painel.innerHTML = resultadosHTML;
            painel.style.display = 'block';
        }

        // Função Dinâmica de Exportação para Excel (Tratada contra quebras e erros de acentuação)
        function gerarExcel() {
            if (abaAtiva === 'portaria') {
                const registros = JSON.parse(localStorage.getItem('vicon_portaria') || '[]');
                if (registros.length === 0) {
                    alert("Não há dados de Portaria Geral para exportar.");
                    return;
                }

                let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // \uFEFF corrige acentuação no Excel Windows
                csvContent += "Tipo;Nome;CPF;Empresa;Quem Visitou\n";

                registros.forEach(function(r) {
                    let nome = r.nome.replace(/;/g, ',');
                    let empresa = r.empresa ? r.empresa.replace(/;/g, ',') : '-';
                    let visitado = r.visitado.replace(/;/g, ',');
                    csvContent += `${r.tipo};${nome};${r.cpf};${empresa};${visitado}\n`;
                });

                baixarCSV(csvContent, "relatorio_portaria_vicon.csv");
            } else {
                const entregas = JSON.parse(localStorage.getItem('vicon_entregas') || '[]');
                if (entregas.length === 0) {
                    alert("Não há dados de Recebimento/Coleta para exportar.");
                    return;
                }

                let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
                csvContent += "Operação;Motorista;CPF Motorista;Transportadora;Placa;Modelo;NF Entrada;Entrada;Saída;NF Saída\n";

                entregas.forEach(function(e) {
                    let entregador = e.entregador.replace(/;/g, ',');
                    let empresa = e.empresa_entrega ? e.empresa_entrega.replace(/;/g, ',') : '-';
                    let modelo = e.modelo_carro ? e.modelo_carro.replace(/;/g, ',') : '-';
                    csvContent += `${e.operacao};${entregador};${e.cpf_entregador};${empresa};${e.placa_carro};${modelo};${e.numero_nf || '-'};${e.entrada};${e.saida || 'No Pátio'};${e.numero_nf_saida || '-'}\n`;
                });

                baixarCSV(csvContent, "relatorio_patio_vicon.csv");
            }
        }

        function baixarCSV(content, filename) {
            const encodedUri = encodeURI(content);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", filename);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = function() {
            atualizarTabela();
        };
    </script>
</body>
</html>
